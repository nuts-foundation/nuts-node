name: Notify on maintainer PR

on:
  pull_request:
    types: [opened, ready_for_review, review_requested]
    branches:
      - master

jobs:
  notify:
    name: Slack notification
    runs-on: ubuntu-latest
    if: |
      github.event.action != 'review_requested' &&
      !github.event.pull_request.draft &&
      contains(fromJSON('["woutslakhorst","reinkrul","gerardsn","stevenvegt"]'), github.event.pull_request.user.login)
    steps:
      - name: Send Slack message
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "channel": "#nuts-core-team",
              "text": "*New PR from maintainer <@${{ github.event.pull_request.user.login }}>*\n<${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}>",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*New PR from maintainer <https://github.com/${{ github.event.pull_request.user.login }}|${{ github.event.pull_request.user.login }}>*\n<${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}>"
                  }
                }
              ]
            }

  notify-steven-re-review:
    name: Notify Steven on re-review request
    runs-on: ubuntu-latest
    if: |
      github.event.action == 'review_requested' &&
      github.event.requested_reviewer.login == 'stevenvegt'
    steps:
      - name: Send Slack message to Steven
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "channel": "#DS5VD66D9",
              "text": "<@DS5VD66D9> Re-review requested\n<${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}>",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<@DS5VD66D9> Re-review requested\n<${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}>\nRequested by <https://github.com/${{ github.event.sender.login }}|${{ github.event.sender.login }}>"
                  }
                }
              ]
            }

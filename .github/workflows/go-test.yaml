name: 'Go test'

on:
  push:
    branches:
      - 'master'
      - 'V*'
  pull_request:
    branches:
      - 'master'
      - 'V*'

jobs:
  test:
    runs-on: ubuntu-latest
    # Run inside a debian-based Go container so DNS resolution errors come from
    # glibc ("no such host") instead of the runner's systemd-resolved
    # ("server misbehaving"), which several unit tests assert against verbatim.
    container: golang:1.26.3
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Test
        run: go test -p 1 ./... -race -coverprofile=c_raw.out

      - name: Filter coverage
        run: grep -v generated c_raw.out | grep -v mock | grep -v test > c.out

      - name: Upload coverage to Qlty
        uses: qltysh/qlty-action/coverage@a19242102d17e497f437d7466aa01b528537e899 # v2.2.0
        with:
          oidc: true
          files: c.out
          format: coverprofile

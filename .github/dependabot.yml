version: 2
updates:
  # github actions
  - package-ecosystem: "github-actions"
    # checks workflow files in /.github/workflows
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Go
  - package-ecosystem: "gomod"
    # checks /go.mod
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      go-modules:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Docker
  - package-ecosystem: "docker"
    # checks /Dockerfile
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Python (PRs disabled)
  - package-ecosystem: "pip"
    # checks /docs/requirements.txt
    directory: "/docs"
    schedule:
      interval: "weekly"
    # Allow up to 0 open pull requests for pip dependencies
    open-pull-requests-limit: 0
